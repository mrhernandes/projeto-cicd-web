name: Release seguro com rollback

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Tag para publicar, por exemplo v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-release
  cancel-in-progress: false

jobs:
  validar-release:
    name: Validar release
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}

      - name: Validar formato da release
        run: |
          RELEASE_REF="${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}"
          echo "Release selecionada: $RELEASE_REF"

          if [[ ! "$RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "A release deve seguir o formato v1.0.0"
            exit 1
          fi

      - name: Validar arquivos obrigatorios
        run: |
          test -f index.html
          test -f styles.css
          grep -q "styles.css" index.html

      - name: Verificacao simples de seguranca
        run: |
          if grep -RniE "(senha|password|api_key|private_key)" index.html styles.css README.md 2>/dev/null; then
            echo "Possivel segredo encontrado nos arquivos do projeto."
            exit 1
          fi

      - name: Smoke test local
        run: |
          python3 -m http.server 8080 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          sleep 2

          curl -fsS http://localhost:8080/index.html | grep -q "Deploy automático"
          curl -fsS http://localhost:8080/styles.css > /dev/null

  publicar-production:
    name: Publicar production
    needs: validar-release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar codigo da release
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref }}

      - name: Preparar pacote de publicacao
        run: |
          RELEASE_REF="${{ github.event_name == 'workflow_dispatch' && inputs.release_ref || github.ref_name }}"

          mkdir -p public/production
          cp index.html public/production/index.html
          cp styles.css public/production/styles.css

          cat > public/index.html <<EOF
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Release publicada</title>
          </head>
          <body>
            <h1>Release publicada</h1>
            <p>Release atual: $RELEASE_REF</p>
            <p><a href="./production/">Abrir production</a></p>
          </body>
          </html>
          EOF

          cat > public/release-info.txt <<EOF
          release=$RELEASE_REF
          commit=$GITHUB_SHA
          EOF

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6

      - name: Enviar artefato do Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Fazer deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
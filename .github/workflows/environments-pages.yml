name: Publicar staging e production

on:
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validar ambientes
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v6

      - name: Validar arquivos de staging
        run: |
          test -f ambientes/staging/index.html
          test -f ambientes/staging/styles.css
          grep -q "styles.css" ambientes/staging/index.html

      - name: Validar arquivos de production
        run: |
          test -f ambientes/production/index.html
          test -f ambientes/production/styles.css
          grep -q "styles.css" ambientes/production/index.html

  deploy:
    name: Publicar GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v6

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6

      - name: Preparar publicacao
        run: |
          mkdir -p public
          cp -R ambientes/staging public/staging
          cp -R ambientes/production public/production
          cat > public/index.html <<'EOF'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="utf-8">
            <title>Ambientes do projeto</title>
          </head>
          <body>
            <h1>Ambientes do projeto-cicd-web</h1>
            <ul>
              <li><a href="./staging/">Abrir staging</a></li>
              <li><a href="./production/">Abrir production</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Enviar artefato do Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Fazer deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
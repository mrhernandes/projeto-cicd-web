name: Publicar staging e production

on:
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validar site
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v6

      - name: Validar arquivos do projeto
        run: |
          test -f index.html
          test -f styles.css
          grep -q "styles.css" index.html

  deploy:
    name: Publicar GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar branch atual para staging
        uses: actions/checkout@v6
        with:
          path: current

      - name: Baixar main para production
        if: github.ref_name != 'main'
        uses: actions/checkout@v6
        with:
          ref: main
          path: main-version

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v6

      - name: Preparar publicacao
        run: |
          mkdir -p public/staging public/production

          cp current/index.html public/staging/index.html
          cp current/styles.css public/staging/styles.css

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            cp current/index.html public/production/index.html
            cp current/styles.css public/production/styles.css
          else
            cp main-version/index.html public/production/index.html
            cp main-version/styles.css public/production/styles.css
          fi

          cat > public/index.html <<'EOF'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="utf-8">
            <title>Ambientes do projeto</title>
          </head>
          <body>
            <h1>Ambientes do projeto-cicd-web</h1>
            <ul>
              <li><a href="./staging/">Abrir staging</a></li>
              <li><a href="./production/">Abrir production</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Enviar artefato do Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Fazer deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4